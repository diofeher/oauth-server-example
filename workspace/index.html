<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 60px auto; padding: 0 20px; color: #1a1a1a; }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    #loading { color: #888; }
    #app { display: none; }
    #userInfo { margin-top: 16px; padding: 12px; background: #f5f5f5; border-radius: 6px; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; }
    button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; background: #cc3333; color: white; margin-top: 16px; }
    .success { color: #228833; font-size: 0.9rem; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Workspace</h1>

  <div id="loading">Authenticating...</div>

  <div id="app">
    <p class="success">Signed in automatically via SSO</p>
    <div id="userInfo"></div>
    <button onclick="signOut()">Sign Out</button>
  </div>

  <script>
    const AUTH_URL = 'http://localhost:8080/authorize';
    const TOKEN_URL = 'http://localhost:8080/token';
    const USERINFO_URL = 'http://localhost:8080/userinfo';
    const CLIENT_ID = 'workspace';
    const REDIRECT_URI = window.location.origin + window.location.pathname;

    init();

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const state = params.get('state');

      if (code && state) {
        window.history.replaceState({}, '', window.location.pathname);
        await handleCallback(code, state);
        return;
      }

      if (sessionStorage.getItem('access_token')) {
        await showApp();
        return;
      }

      // No token — start PKCE flow (will auto-redirect back if session exists on oauth-server)
      startAuth();
    }

    function startAuth() {
      const codeVerifier = generateCodeVerifier();
      const state = generateRandomString(32);

      sessionStorage.setItem('pkce_code_verifier', codeVerifier);
      sessionStorage.setItem('pkce_state', state);

      generateCodeChallenge(codeVerifier).then(codeChallenge => {
        const params = new URLSearchParams({
          client_id: CLIENT_ID,
          redirect_uri: REDIRECT_URI,
          response_type: 'code',
          scope: 'openid profile',
          state: state,
          code_challenge: codeChallenge,
          code_challenge_method: 'S256',
        });
        window.location.href = `${AUTH_URL}?${params}`;
      });
    }

    async function handleCallback(code, state) {
      const savedState = sessionStorage.getItem('pkce_state');
      if (state !== savedState) {
        showError('State mismatch. Possible CSRF attack.');
        return;
      }

      const codeVerifier = sessionStorage.getItem('pkce_code_verifier');
      sessionStorage.removeItem('pkce_state');
      sessionStorage.removeItem('pkce_code_verifier');

      try {
        const resp = await fetch(TOKEN_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({
            grant_type: 'authorization_code',
            client_id: CLIENT_ID,
            code: code,
            redirect_uri: REDIRECT_URI,
            code_verifier: codeVerifier,
          }),
        });

        if (!resp.ok) {
          const err = await resp.json();
          throw new Error(err.error_description || err.error);
        }

        const data = await resp.json();
        sessionStorage.setItem('access_token', data.access_token);
        if (data.refresh_token) sessionStorage.setItem('refresh_token', data.refresh_token);
        await showApp();
      } catch (e) {
        showError(`Token exchange failed: ${e.message}`);
      }
    }

    async function showApp() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';

      const token = sessionStorage.getItem('access_token');
      try {
        const resp = await fetch(USERINFO_URL, {
          headers: { 'Authorization': `Bearer ${token}` },
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        document.getElementById('userInfo').textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        document.getElementById('userInfo').textContent = `Failed to load user info: ${e.message}`;
      }
    }

    function signOut() {
      sessionStorage.removeItem('access_token');
      sessionStorage.removeItem('refresh_token');
      window.location.href = `http://localhost:8080/logout?redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;
    }

    function showError(msg) {
      document.getElementById('loading').textContent = `Error: ${msg}`;
    }

    function generateRandomString(length) {
      const arr = new Uint8Array(length);
      crypto.getRandomValues(arr);
      return Array.from(arr, b => b.toString(16).padStart(2, '0')).join('');
    }

    function generateCodeVerifier() {
      const arr = new Uint8Array(32);
      crypto.getRandomValues(arr);
      return base64UrlEncode(arr);
    }

    async function generateCodeChallenge(verifier) {
      const encoded = new TextEncoder().encode(verifier);
      const digest = await crypto.subtle.digest('SHA-256', encoded);
      return base64UrlEncode(new Uint8Array(digest));
    }

    function base64UrlEncode(buffer) {
      return btoa(String.fromCharCode(...buffer))
        .replace(/\+/g, '-')
        .replace(/\//g, '_')
        .replace(/=+$/, '');
    }
  </script>
</body>
</html>
